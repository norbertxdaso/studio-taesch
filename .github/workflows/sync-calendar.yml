name: Sync Airbnb Calendar

on:
  schedule:
    - cron: '*/5 * * * *'   # alle 5 Minuten
  workflow_dispatch:
    inputs:
      checkin:
        description: 'Anreise (YYYY-MM-DD) — leer lassen für reinen Sync'
        required: false
      checkout:
        description: 'Abreise (YYYY-MM-DD)'
        required: false
      name:
        description: 'Gastname'
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch iCal and generate availability.json
        run: |
          python3 - <<'EOF'
          import urllib.request, json, re
          from datetime import date, timedelta

          url = "https://www.airbnb.de/calendar/ical/26757018.ics?t=df0c519f80e943fd8a8054737de37e8c"
          with urllib.request.urlopen(url, timeout=15) as r:
              ical = r.read().decode("utf-8", errors="ignore")

          booked = set()
          for event in ical.split("BEGIN:VEVENT")[1:]:
              ds = re.search(r"DTSTART(?:;VALUE=DATE)?:(\d{8})", event)
              de = re.search(r"DTEND(?:;VALUE=DATE)?:(\d{8})", event)
              if ds and de:
                  s = date(int(ds[1][:4]), int(ds[1][4:6]), int(ds[1][6:8]))
                  e = date(int(de[1][:4]), int(de[1][4:6]), int(de[1][6:8]))
                  d = s
                  while d < e:
                      booked.add(str(d))
                      d += timedelta(days=1)

          out = {"booked": sorted(booked), "updated": str(date.today())}
          with open("availability.json", "w") as f:
              json.dump(out, f)
          print(f"Done: {len(booked)} booked days")
          EOF

      - name: Commit if changed
        run: |
          git config user.name "Norbert Bot"
          git config user.email "norbert_bot@dasobot.cloud"
          git add availability.json
          git diff --cached --quiet || git commit -m "chore: sync Airbnb calendar [skip ci]"
          git push

  # Neues Workflow für Direktbuchung (wird per API-Dispatch aufgerufen)
  add-direct-booking:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.checkin != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add booking to direct-bookings.ics
        run: |
          python3 - <<EOF
          import re
          from datetime import date, timedelta, datetime

          checkin  = "${{ github.event.inputs.checkin }}"
          checkout = "${{ github.event.inputs.checkout }}"
          name     = "${{ github.event.inputs.name }}"

          uid = datetime.utcnow().strftime('%Y%m%dT%H%M%S') + '@studiotaesch'
          dtstart = checkin.replace('-','')
          dtend   = checkout.replace('-','')
          stamp   = datetime.utcnow().strftime('%Y%m%dT%H%M%SZ')

          event = (
              f"BEGIN:VEVENT\r\n"
              f"UID:{uid}\r\n"
              f"DTSTART;VALUE=DATE:{dtstart}\r\n"
              f"DTEND;VALUE=DATE:{dtend}\r\n"
              f"SUMMARY:Direktbuchung {name}\r\n"
              f"DTSTAMP:{stamp}\r\n"
              f"END:VEVENT\r\n"
          )

          with open('direct-bookings.ics', 'r') as f:
              content = f.read()
          content = content.replace('END:VCALENDAR', event + 'END:VCALENDAR')
          with open('direct-bookings.ics', 'w') as f:
              f.write(content)
          print('Booking added:', checkin, '-', checkout, name)
          EOF

      - name: Commit
        run: |
          git config user.name "Norbert Bot"
          git config user.email "norbert_bot@dasobot.cloud"
          git add direct-bookings.ics
          git commit -m "booking: ${{ github.event.inputs.checkin }} bis ${{ github.event.inputs.checkout }} (${{ github.event.inputs.name }})"
          git push
